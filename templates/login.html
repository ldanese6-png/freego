<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accedi - FreeGo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans text-gray-800 flex flex-col min-h-screen">

    <nav class="bg-white shadow-sm p-4 border-b border-gray-100">
        <div class="max-w-6xl mx-auto flex justify-center items-center">
            <a href="/" class="flex items-center gap-2 group">
                <svg class="h-8 w-8 text-green-600 group-hover:text-green-500 transition-colors" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                    <path d="M3 3v5h5"></path><path d="M10 16V8h5"></path><path d="M10 12h4"></path>
                </svg>
                <h1 class="text-2xl font-extrabold text-green-700 tracking-tight">Free<span class="text-green-500">Go</span></h1>
            </a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-lg shadow-md max-w-md w-full border border-gray-100">
            <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Bentornato!</h2>
            
            {% if errore %}
            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 text-sm text-center">
                {{ errore }}
            </div>
            {% endif %}

            <form action="/login" method="POST" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" name="email" required placeholder="mario@email.com" class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" name="password" required placeholder="••••••••" class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
                
                <button type="submit" class="w-full bg-green-600 text-white font-bold py-3 rounded hover:bg-green-700 transition mt-6">
                    Accedi
                </button>
            </form>
            
            <p class="text-center text-sm text-gray-500 mt-6">
                Non hai un account? <a href="/registrati" class="text-green-600 font-bold hover:underline">Registrati ora</a>
            </p>
        </div>
    </main>

</body>
</html>
