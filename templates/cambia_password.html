<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambia Password - FreeGo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-100 font-sans text-slate-800 flex flex-col min-h-screen">

    <nav class="bg-slate-900 text-white shadow-sm p-4 sticky top-0 z-50 border-b border-emerald-500">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-extrabold text-emerald-500 tracking-tight">FreeGo</h1>
            <a href="/profilo" class="text-slate-300 hover:text-emerald-400 font-medium transition flex items-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> Annulla e torna al Profilo
            </a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-white p-8 rounded-3xl shadow-lg border border-slate-200">
            
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center text-slate-600 mx-auto mb-4 shadow-inner">
                    <i class="fa-solid fa-lock text-2xl"></i>
                </div>
                <h2 class="text-2xl font-extrabold text-slate-900">Cambia Password</h2>
                <p class="text-sm text-slate-500 mt-2">Scegli una nuova password sicura per il tuo account.</p>
            </div>

            {% if errore %}
                <div class="bg-red-50 border border-red-200 text-red-700 p-4 mb-6 rounded-xl flex items-start gap-3 shadow-sm">
                    <i class="fa-solid fa-triangle-exclamation mt-1"></i>
                    <p class="font-bold text-sm">{{ errore }}</p>
                </div>
            {% endif %}

            {% if messaggio %}
                <div class="bg-emerald-50 border border-emerald-200 text-emerald-800 p-4 mb-6 rounded-xl flex items-start gap-3 shadow-sm">
                    <i class="fa-solid fa-check-circle mt-1 text-emerald-600"></i>
                    <p class="font-bold text-sm">{{ messaggio }}</p>
                </div>
            {% endif %}

            <form action="{{ url_for('cambia_password') }}" method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Vecchia Password</label>
                    <input type="password" name="vecchia_password" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-colors bg-slate-50 focus:bg-white shadow-inner" placeholder="••••••••">
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Nuova Password di Sicurezza</label>
                    <input type="password" name="nuova_password" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-colors bg-slate-50 focus:bg-white shadow-inner" placeholder="Nuova password sicura">
                    <p class="text-[11px] text-slate-500 mt-2 flex items-start gap-1"><i class="fa-solid fa-circle-info text-emerald-500 mt-0.5"></i> Almeno 8 caratteri, una lettera maiuscola, una minuscola e un numero.</p>
                </div>

                <button type="submit" class="w-full bg-emerald-600 text-white font-bold py-3.5 px-4 rounded-xl hover:bg-emerald-500 transition shadow-md shadow-emerald-200 hover:-translate-y-0.5 flex justify-center items-center gap-2 mt-4">
                    <i class="fa-solid fa-floppy-disk"></i> Aggiorna Password
                </button>
            </form>
        </div>
    </main>

</body>
</html>
