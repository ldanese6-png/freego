<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Registrati - FreeGo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-100 font-sans text-slate-800 flex flex-col min-h-screen">

    <nav class="bg-slate-900 text-white shadow-sm p-4 border-b border-emerald-500 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="/" class="text-emerald-500 font-extrabold text-2xl tracking-tight">FreeGo</a>
            <a href="/" class="text-slate-300 hover:text-emerald-400 font-medium transition flex items-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> Torna alla Home
            </a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-white p-8 rounded-3xl shadow-lg border border-slate-200">
            
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600 mx-auto mb-4 shadow-inner">
                    <i class="fa-solid fa-user-plus text-2xl"></i>
                </div>
                <h2 class="text-3xl font-extrabold text-slate-900">Unisciti a noi</h2>
                <p class="text-sm text-slate-500 mt-2">Crea un account per iniziare a regalare o richiedere oggetti gratuiti.</p>
            </div>

            {% if errore %}
                <div class="bg-red-50 border border-red-200 text-red-700 p-4 mb-6 rounded-xl flex items-start gap-3 shadow-sm">
                    <i class="fa-solid fa-triangle-exclamation mt-1"></i>
                    <p class="font-bold text-sm leading-tight">{{ errore }}</p>
                </div>
            {% endif %}

            <form action="{{ url_for('registrati') }}" method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Nome Pubblico</label>
                    <input type="text" name="nome" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-colors bg-slate-50 focus:bg-white shadow-inner" placeholder="Es. Mario Rossi">
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Email</label>
                    <input type="email" name="email" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-colors bg-slate-50 focus:bg-white shadow-inner" placeholder="mario@email.it">
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Password di Sicurezza</label>
                    <input type="password" name="password" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-colors bg-slate-50 focus:bg-white shadow-inner" placeholder="••••••••">
                    <p class="text-[11px] text-slate-500 mt-2 flex items-start gap-1"><i class="fa-solid fa-circle-info text-emerald-500 mt-0.5"></i> La password deve contenere almeno 8 caratteri, una lettera maiuscola, una minuscola e un numero.</p>
                </div>

                <button type="submit" class="w-full bg-slate-900 text-white font-bold py-3.5 px-4 rounded-xl hover:bg-slate-800 transition shadow-lg shadow-slate-900/30 hover:-translate-y-0.5 flex justify-center items-center gap-2 mt-2">
                    Crea Account <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
            
            <p class="text-center text-sm text-slate-500 mt-8">
                Hai già un account? <a href="/login" class="text-emerald-600 font-bold hover:underline">Accedi qui</a>
            </p>
        </div>
    </main>

</body>
</html>
