<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Modifica Annuncio - FreeGo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <nav class="bg-white shadow-sm p-4 border-b">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <a href="/" class="text-2xl font-extrabold text-green-700">Free<span class="text-green-500">Go</span></a>
            <a href="/profilo" class="text-gray-500 hover:text-gray-800 font-medium"><i class="fa-solid fa-arrow-left mr-1"></i> Annulla Modifiche</a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-xl shadow-lg max-w-lg w-full border border-gray-100">
            <h2 class="text-3xl font-extrabold text-center text-gray-800 mb-6">Modifica Annuncio</h2>
            
            <form action="/modifica_annuncio/{{ annuncio.id }}" method="POST" enctype="multipart/form-data" class="space-y-5">
                
                <div>
                    <label class="block text-gray-700 font-bold mb-1">Titolo</label>
                    <input type="text" name="titolo" value="{{ annuncio.titolo }}" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>

                <div>
                    <label class="block text-gray-700 font-bold mb-1">Categoria</label>
                    <div class="relative">
                        <select name="categoria" class="w-full px-4 py-3 border border-gray-300 rounded-lg appearance-none focus:ring-2 focus:ring-blue-500 focus:outline-none bg-white">
                            <option value="Arredamento" {% if annuncio.categoria == 'Arredamento' %}selected{% endif %}>Arredamento</option>
                            <option value="Elettronica" {% if annuncio.categoria == 'Elettronica' %}selected{% endif %}>Elettronica</option>
                            <option value="Abbigliamento" {% if annuncio.categoria == 'Abbigliamento' %}selected{% endif %}>Abbigliamento</option>
                            <option value="Libri & Film" {% if annuncio.categoria == 'Libri & Film' %}selected{% endif %}>Libri & Film</option>
                            <option value="Sport & Tempo Libero" {% if annuncio.categoria == 'Sport & Tempo Libero' %}selected{% endif %}>Sport & Tempo Libero</option>
                            <option value="Altro" {% if annuncio.categoria == 'Altro' %}selected{% endif %}>Altro</option>
                        </select>
                        <i class="fa-solid fa-chevron-down absolute right-4 top-4 text-gray-400 pointer-events-none"></i>
                    </div>
                </div>

                <div>
                    <label class="block text-gray-700 font-bold mb-1">Luogo</label>
                    <input type="text" name="luogo" value="{{ annuncio.luogo }}" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>

                <div>
                    <label class="block text-gray-700 font-bold mb-1">Descrizione</label>
                    <textarea name="descrizione" rows="3" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">{{ annuncio.descrizione }}</textarea>
                </div>

                <div class="bg-blue-50 border border-blue-100 p-4 rounded-lg flex items-center">
                    <input type="checkbox" id="spedizione" name="spedizione" class="w-5 h-5 text-blue-600 rounded border-gray-300 focus:ring-blue-500" {% if annuncio.spedizione %}checked{% endif %}>
                    <label for="spedizione" class="ml-3 text-gray-700 font-medium cursor-pointer">
                        Sono disposto a spedire
                    </label>
                </div>

                <div>
                    <label class="block text-gray-700 font-bold mb-1">Cambia foto (opzionale)</label>
                    <p class="text-xs text-gray-400 mb-2">Se non carichi nulla, manterremo la foto attuale.</p>
                    <input type="file" name="immagine" accept="image/*" class="w-full text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition">
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white font-bold text-lg py-4 rounded-lg shadow-md hover:bg-blue-700 transition mt-4">
                    Salva Modifiche
                </button>
            </form>
        </div>
    </main>
</body>
</html>
